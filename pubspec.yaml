name: caliday
description: "CaliDay — home calisthenics workouts with streak tracking and gamification."
publish_to: 'none'

version: 1.7.0+8

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  intl: ^0.20.0
  flutter_riverpod: ^3.0.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  go_router: ^17.2.0
  flutter_svg: ^2.2.4
  audioplayers: ^6.6.0

  url_launcher: ^6.3.0
  package_info_plus: ^9.0.1

  # Виджет рабочего стола
  home_widget: ^0.9.0
  app_links: ^7.0.0

  # Анимации
  lottie: ^3.3.1

  # Здоровье (Apple Health / Google Health Connect)
  health: ^13.3.1

  # Friends (QR + BLE)
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  flutter_blue_plus: ^2.2.1
  ble_peripheral: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.11.1
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#4DA6FF"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: false

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/goro/
    - assets/skala/
    - assets/sounds/
    - assets/animations/